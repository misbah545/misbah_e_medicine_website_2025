<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - E-Medicine</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .product-section {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            margin-bottom: 60px;
        }

        .product-img-wrapper {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .product-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        .product-img-wrapper:hover img {
            transform: scale(1.05); /* Slight zoom on hover */
        }

        .product-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-info h1 {
            font-size: 2.2rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .product-info .price {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 25px;
        }

        .product-info .description {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        /* Reviews Section */
        .reviews-section {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .reviews-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .review-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        .review-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border-left: 5px solid var(--primary-color);
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .review-box p {
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .review-box .rating {
            font-weight: bold;
            color: #f59e0b;
        }

        .review-box .date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* Input Form */
        .review-input-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .review-input-card textarea {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            resize: vertical;
            min-height: 120px;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .review-input-card textarea:focus {
            border-color: var(--primary-color);
        }

        .review-input-card select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div id="navbar"></div>

        <section class="product-section">
            <div class="product-container animate-slide-up">
                <div class="product-img-wrapper">
                    <img id="product-image" alt="Product Image" onerror="this.src='https://placehold.co/400x400?text=No+Image';">
                </div>
                
                <div class="product-info">
                    <h1 id="product-name">Loading...</h1>
                    <div class="price" id="product-price">₹--</div>
                    <div class="description" id="product-description">Please wait while we fetch the product details.</div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="addToCartDetail()">Add to Cart 🛒</button>
                    </div>
                </div>
            </div>

            <div class="reviews-section animate-slide-up" style="animation-delay: 0.2s;">
                <div class="reviews-header">
                    <h2>Customer Reviews</h2>
                </div>
                
                <div id="reviews-list" class="review-container">
                    <!-- Reviews injected by JS -->
                </div>

                <div class="review-input-card">
                    <h3>Write a Review</h3>
                    <p class="text-muted" style="margin-bottom: 15px;">Share your experience with this product</p>
                    <textarea id="review-text" placeholder="Write your review here..."></textarea>
                    <select id="rating">
                        <option value="5">⭐⭐⭐⭐⭐ (5 - Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (4 - Very Good)</option>
                        <option value="3">⭐⭐⭐ (3 - Average)</option>
                        <option value="2">⭐⭐ (2 - Poor)</option>
                        <option value="1">⭐ (1 - Terrible)</option>
                    </select>
                    <button class="btn btn-gradient" onclick="submitReview()">Submit Review</button>
                </div>
            </div>
        </section>

        <div id="footer"></div>
    </div>

    <script src="http://localhost:8000/frontend/pages/product_details.js"></script>
    <script>
        fetch('../components/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        function addToCartDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const product_id = urlParams.get('product_id');
            let quantity = prompt("Enter quantity to add to cart:", "1");
            if (!quantity || isNaN(quantity) || quantity < 1) {
                alert("Invalid quantity!");
                return;
            }

            fetch('http://localhost:8000/backend/controllers/cart.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `product_id=${product_id}&quantity=${quantity}`
            })
            .then(response => response.json())
            .then(data => {
                if(data.message === "User not logged in" || data.message.includes("logged in")) {
                    alert("Please login to add items to your cart.");
                    window.location.href = "Customer_login.html";
                } else {
                    alert(data.message);
                }
            })
            .catch(error => console.error('Error:', error));
        }
    </script>
<script src="../js/app.js"></script>
</body>
</html>
