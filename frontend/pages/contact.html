<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - E-Medicine</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .contact-header {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            padding: 80px 20px 100px; /* Extra bottom padding for overlap */
            text-align: center;
        }

        .contact-header h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 15px;
        }

        .contact-section {
            padding: 0 20px 60px;
            max-width: 1000px;
            margin: -60px auto 0;
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .contact-info-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border-top: 5px solid var(--accent-color);
        }

        .contact-info-card h2 {
            font-size: 1.5rem;
            color: var(--secondary-color);
            margin-bottom: 25px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 15px;
        }

        .info-icon {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .info-text strong {
            display: block;
            color: var(--text-main);
            margin-bottom: 3px;
        }

        .info-text span {
            color: var(--text-muted);
        }

        .contact-form-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .contact-form-card h2 {
            font-size: 1.8rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }
        
        .contact-form-card p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: all var(--transition-fast);
        }

        .form-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        @media (max-width: 768px) {
            .contact-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div id="navbar"></div>

        <div class="contact-header animate-fade-in">
            <h1>Get in Touch</h1>
            <p style="color:#f1f5f9;">We'd love to hear from you. Please drop us a message below.</p>
        </div>

        <div class="contact-section animate-slide-up">
            <div class="contact-info-card">
                <h2>Our Office</h2>
                
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div class="info-text">
                        <strong>Address</strong>
                        <span>Shahpur Ahmedabad-380001</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">📞</div>
                    <div class="info-text">
                        <strong>Phone</strong>
                        <span>+91 9825818752</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">✉️</div>
                    <div class="info-text">
                        <strong>Email</strong>
                        <span>emedicinewebsite@gmail.com</span>
                    </div>
                </div>
            </div>

            <div class="contact-form-card">
                <h2>Send a Message</h2>
                <p>Fill out the form below and we will get back to you immediately.</p>
                
                <form id="contactForm">
                    <div class="form-group">
                        <input type="text" name="name" class="input-control" placeholder="Your Full Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" class="input-control" placeholder="Your Email Address" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="How can we help you?" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>

        <div id="footer"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        fetch('../components/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        $(document).ready(function () {
            $("#contactForm").on("submit", function (event) {
                event.preventDefault(); 
                let btn = $(this).find('button[type="submit"]');
                let originalText = btn.text();
                btn.prop('disabled', true).text('Sending...');

                $.ajax({
                    url: "http://localhost:8000/backend/controllers/contact.php",
                    type: "POST",
                    data: $(this).serialize(),
                    dataType: "json",
                    success: function (response) {
                        if (response.status === "error") {
                            alert(response.message);
                        } else if (response.status === "success") {
                            alert(response.message);
                            $("#contactForm")[0].reset();
                        }
                        btn.prop('disabled', false).text(originalText);
                    },
                    error: function () {
                        alert("An unexpected error occurred. Please try again.");
                        btn.prop('disabled', false).text(originalText);
                    }
                });
            });
        });
    </script>
<script src="../js/app.js"></script>
</body>
</html>
