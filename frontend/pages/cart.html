<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - E-Medicine</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .cart-section {
            padding: 60px 20px;
            max-width: 1000px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }
        
        .cart-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .cart-header h1 {
            font-size: 2.5rem;
            color: var(--secondary-color);
        }

        .cart-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-table th {
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            padding: 15px 20px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }

        .cart-table td {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            color: var(--text-main);
        }
        
        .cart-table tr:last-child td {
            border-bottom: none;
        }

        .cart-table tr:hover {
            background: #f8fafc;
        }

        .btn-remove {
            background: #fee2e2;
            color: #ef4444;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: 500;
        }

        .btn-remove:hover {
            background: #ef4444;
            color: white;
        }

        .total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .total-section h2 {
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .total-section .amount {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.8rem;
        }

        .checkout-actions {
            display: flex;
            gap: 15px;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
        }

        /* Modal Content */
        .shipping-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 500px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .shipping-modal.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .close-btn {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
        }

        @media (max-width: 768px) {
            .total-section {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            .cart-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        
        <section class="cart-section animate-slide-up">
            <div class="cart-header">
                <h1>Your Shopping Cart</h1>
            </div>

            <div class="cart-card">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>

            <div class="total-section">
                <h2>Total Bill: <span class="amount">₹<span id="total-bill">0.00</span></span></h2>
                <div class="checkout-actions">
                    <button id="add-delivery-btn" class="btn btn-outline">Add Delivery Details</button>
                    <button id="checkout-btn" class="btn btn-primary">Proceed to Payment</button>
                </div>
            </div>
        </section>

        <div id="footer"></div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay"></div>
    
    <div class="shipping-modal" id="shipping-popup">
        <div class="modal-header">
            <h2>Shipping Details</h2>
            <button class="close-btn" onclick="closePopup()">&times;</button>
        </div>
        <div class="form-group">
            <input type="text" id="shipp_address" class="input-control" placeholder="Street Address" required>
        </div>
        <div class="form-group">
            <input type="text" id="shipp_city" class="input-control" placeholder="City" required>
        </div>
        <div class="form-group">
            <input type="text" id="shipp_state" class="input-control" placeholder="State" required>
        </div>
        <div class="form-group">
            <input type="text" id="shipp_zip" class="input-control" placeholder="Zip Code" required>
        </div>
        <div class="form-group">
            <input type="text" id="shipp_country" class="input-control" placeholder="Country" required>
        </div>
        <button id="submit-shipping" class="btn btn-gradient" style="width: 100%;">Save Address</button>
    </div>

    <script>
        fetch('../components/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        function loadCart() {
            $.ajax({
                url: "http://localhost:8000/backend/controllers/fetch_cart.php",
                method: "GET",
                dataType: "json",
                success: function (data) {
                    let cartHTML = "";
                    let totalBill = 0;
                    
                    if (data.length === 0) {
                        $("#cart-items").html("<tr><td colspan='5' style='text-align:center; padding:40px;'>Your cart is empty.</td></tr>");
                        $("#total-bill").text("0.00");
                        return;
                    }

                    data.forEach(item => {
                        let total = parseFloat(item.Price) * parseInt(item.Quantity);
                        totalBill += total;
                        cartHTML += `<tr id='row-${item.Product_id}'>
                            <td style="font-weight:500;">${item.Pro_name}</td>
                            <td style="color:var(--text-muted);">₹${item.Price}</td>
                            <td>${item.Quantity}</td>
                            <td class='cart-total' style="font-weight:600; color:var(--primary-color);">₹${total.toFixed(2)}</td>
                            <td><button class='btn-remove' data-id='${item.Product_id}'>Remove</button></td>
                        </tr>`;
                    });

                    $("#cart-items").html(cartHTML);
                    $("#total-bill").text(totalBill.toFixed(2));
                    attachCancelEvent();
                },
                error: function() {
                    // Fallback for UI if backend is offline
                    $("#cart-items").html("<tr><td colspan='5' style='text-align:center; padding:40px;'>Cannot reach backend API.</td></tr>");
                }
            });
        }

        function attachCancelEvent() {
            $(".btn-remove").click(function () {
                let productId = $(this).data("id");
                let row = $(`#row-${productId}`);
                let productName = row.find("td:first").text();

                fetch("http://localhost:8000/backend/controllers/remove_from_cart.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `product_id=${productId}`
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        row.fadeOut(300, function() {
                            $(this).remove();
                            updateTotal();
                        });
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(() => alert("Error removing item."));
            });
        }

        function updateTotal() {
            let total = 0;
            $(".cart-total").each(function () {
                total += parseFloat($(this).text().replace("₹", ""));
            });
            $("#total-bill").text(total.toFixed(2));
        }

        $("#checkout-btn").click(function () {
            let paymentType = prompt("Enter Payment Type (COD or Online):");
            if (!paymentType) return;
            paymentType = paymentType.trim().toLowerCase();

            if (paymentType !== "cod" && paymentType !== "online") {
                alert("Invalid Payment Type! Please enter 'COD' or 'Online'.");
                return;
            }

            $.ajax({
                url: "http://localhost:8000/backend/controllers/generate_bill.php",
                method: "POST",
                data: { payment_type: paymentType },
                success: function (response) {
                    let data = JSON.parse(response);
                    if (data.status === "success") {
                        if (data.redirect_url) {
                            window.location.href = data.redirect_url; 
                        } else {
                            alert("Bill generated but no redirection URL found.");
                        }
                    } else {
                        alert("Error: " + data.message);
                    }
                },
                error: function () {
                    alert("Failed to process payment. (Backend not responding)");
                }
            });
        });

        // Modal Logic
        function closePopup() {
            $("#shipping-popup").removeClass("active");
            setTimeout(() => {
                $("#shipping-popup").hide();
                $("#modalOverlay").fadeOut();
            }, 300);
        }

        $("#add-delivery-btn").click(function () {
            $("#modalOverlay").fadeIn();
            $("#shipping-popup").show();
            setTimeout(() => $("#shipping-popup").addClass("active"), 10);
        });

        $("#modalOverlay").click(closePopup);

        $("#submit-shipping").click(function () {
            let shippAddress = $("#shipp_address").val().trim();
            let shippCity = $("#shipp_city").val().trim();
            let shippState = $("#shipp_state").val().trim();
            let shippZip = $("#shipp_zip").val().trim();
            let shippCountry = $("#shipp_country").val().trim();

            if (!shippAddress || !shippCity || !shippState || !shippZip || !shippCountry) {
                alert("Please fill in all the shipping details.");
                return;
            }

            let btn = $(this);
            btn.prop("disabled", true).text("Saving...");

            $.ajax({
                url: "http://localhost:8000/backend/controllers/shipping.php",
                method: "POST",
                data: {
                    shipp_address: shippAddress,
                    shipp_city: shippCity,
                    shipp_state: shippState,
                    shipp_zip: shippZip,
                    shipp_country: shippCountry
                },
                dataType: "json",
                success: function (response) {
                    if (response.status === "success") {
                        closePopup();
                        // Add a small success notification
                        setTimeout(() => alert("Shipping details saved successfully!"), 300);
                    } else {
                        alert("Error: " + (response.message || "Failed to save shipping details."));
                    }
                },
                error: function () {
                    alert("Failed to save shipping details. Backend offline.");
                },
                complete: function () {
                    btn.prop("disabled", false).text("Save Address");
                }
            });
        });

        // Initialize
        loadCart();
    </script>
<script src="../js/app.js"></script>
</body>
</html>
