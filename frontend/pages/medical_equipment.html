<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Equipment - E-Medicine</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .category-header {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 5px solid var(--accent-color);
        }

        .category-header h1 {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 10px;
        }

        .products-section {
            padding: 60px 20px;
            flex-grow: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
            border: 1px solid var(--border-color);
        }

        .product-img-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.08);
        }

        .product-info {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-info h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .product-info .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .product-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-actions .btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div id="navbar"></div>

        <div class="category-header animate-fade-in">
            <h1>Medical Equipment</h1>
            <p>Reliable healthcare devices and medical equipment.</p>
        </div>

        <section class="products-section">
            <div class="product-grid" id="productGrid"></div>
        </section>

        <div id="footer"></div>
    </div>

    <script>
        fetch('../components/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        function viewDetails(productId) {
            window.location.href = "product_details.html?product_id=" + productId;
        }

        function addToCart(product_id) {
            let quantity = prompt("Enter quantity:", "1");
            if (!quantity || isNaN(quantity) || quantity < 1) {
                alert("Invalid quantity!");
                return;
            }

            fetch('http://localhost:8000/backend/controllers/cart.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `product_id=${product_id}&quantity=${quantity}`
            })
            .then(response => response.json())
            .then(data => alert(data.message))
            .catch(error => console.error('Error:', error));
        }

        document.addEventListener("DOMContentLoaded", function () {
            fetch('http://localhost:8000/backend/controllers/medical_equipment.php')
                .then(response => response.json())
                .then(products => {
                    let productGrid = document.getElementById('productGrid');
                    productGrid.innerHTML = "";
                    
                    if(products.length === 0) {
                        productGrid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>No products found in this category.</p>";
                        return;
                    }

                    products.forEach((product, index) => {
                        let delay = (index * 0.1).toFixed(1);
                        let productHTML = `
                            <div class="card product-card animate-slide-up" style="animation-delay: ${delay}s; opacity: 0;">
                                <div class="product-img-wrapper">
                                    <img src="../assets/images/${product.Product_img}" alt="${product.Pro_name}" onerror="this.src='https://placehold.co/400x300?text=No+Image';">
                                </div>
                                <div class="product-info">
                                    <h3>${product.Pro_name}</h3>
                                    <p class="price">&#8377;${product.Price}</p>
                                    <div class="product-actions">
                                        <button class="btn btn-outline" onclick="viewDetails(${product.Product_id})">View Details</button>
                                        <button class="btn btn-primary" onclick="addToCart(${product.Product_id})">Add to Cart</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        productGrid.innerHTML += productHTML;
                    });
                })
                .catch(error => console.error('Error fetching products:', error));
        });
    </script>
</body>
</html>
