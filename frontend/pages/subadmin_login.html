<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subadmin Portal Login</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-card {
            background: #1e293b; /* Slate 800 */
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-card h1 {
            font-size: 1.8rem;
            color: #f8fafc;
            margin-bottom: 10px;
        }

        .auth-card p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        /* Dark Theme overrides for input */
        .auth-card .input-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
        }
        
        .auth-card .input-control:focus {
            border-color: #10b981; /* Emerald */
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        /* Subadmin emerald button */
        .btn-subadmin {
            background: #059669;
            color: white;
            box-shadow: var(--shadow-md);
            margin-top: 10px;
        }
        .btn-subadmin:hover {
            background: #047857;
            transform: translateY(-2px);
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .role-switch {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .role-switch a {
            color: #94a3b8;
            text-decoration: underline;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="auth-card">
        <div class="security-badge">
            💼 Subadmin Portal
        </div>
        <h1>Staff Login</h1>
        <p>Login to manage inventory and user feedback.</p>
        
        <form id="subadminForm">
            <div class="form-group">
                <label for="email">Staff Email</label>
                <input type="email" id="email" name="email" class="input-control" placeholder="staff@e-medicine.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-subadmin" style="width: 100%;">Authenticate</button>
        </form>

        <div class="role-switch">
            Switch to <a href="admin_login.html">Master Admin</a>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $("#subadminForm").on("submit", function (event) {
                event.preventDefault();
                let btn = $(this).find('button[type="submit"]');
                btn.prop('disabled', true).text('Authenticating...');

                $.ajax({
                    url: "http://localhost:8000/backend/controllers/subadmin_login.php",
                    type: "POST",
                    data: $(this).serialize(),
                    dataType: "json",
                    success: function (response) {
                        if (response.status === "error") {
                            alert(response.message);
                            btn.prop('disabled', false).text('Authenticate');
                        } else if (response.status === "success") {
                            window.location.href = "http://localhost:8000/frontend/pages/subadmin_dashboard.html";
                        }
                    },
                    error: function () {
                        alert("An unexpected error occurred. Please try again.");
                        btn.prop('disabled', false).text('Authenticate');
                    }
                });
            });
        });
    </script>
<script src="../js/app.js"></script>
</body>
</html>
