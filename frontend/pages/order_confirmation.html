<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - E-Medicine</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a, #0d9488);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .confirmation-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #dcfce7;
            color: #16a34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        .confirmation-card h1 {
            color: var(--text-main);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .confirmation-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .order-badge {
            display: inline-block;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 30px;
            border: 1px dashed var(--border-color);
        }

        .redirect-text {
            margin-top: 30px;
            font-size: 0.95rem;
            color: #94a3b8;
        }

        #countdown {
            font-weight: bold;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="confirmation-card">
        <div class="success-icon">✓</div>
        <h1>Order Confirmed!</h1>
        <p>Thank you for your purchase. We've sent a detailed receipt to your email.</p>
        
        <div class="order-badge">
            Order ID: <span id="order_id" style="color: var(--primary-color);">Loading...</span>
        </div>
        
        <div id="invoice-container">
            <p id="invoice-link" style="color: var(--text-muted); font-size: 0.9rem;">Fetching invoice...</p>
        </div>

        <div class="redirect-text">
            Redirecting to homepage in <span id="countdown">25</span> seconds...
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get("order_id");
        
        if (orderId) {
            document.getElementById("order_id").innerText = "#" + orderId;
            
            fetch(`/backend/generate_bill.php?order_id=${orderId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success" && data.pdf_url) {
                        document.getElementById("invoice-container").innerHTML = 
                            `<a href="${data.pdf_url}" class="btn btn-outline" download style="width:100%;">Download Order Invoice PDF</a>`;
                    } else {
                        document.getElementById("invoice-link").innerText = "Invoice PDF is currently generating.";
                    }
                })
                .catch(error => {
                    console.error("Error fetching invoice:", error);
                    document.getElementById("invoice-link").innerText = "";
                });
        } else {
            document.getElementById("order_id").innerText = "UNKNOWN";
            document.getElementById("invoice-link").innerText = "";
        }
        
        let countdown = 25;
        const interval = setInterval(() => {
            countdown--;
            document.getElementById("countdown").innerText = countdown;
            if (countdown === 0) {
                clearInterval(interval);
                window.location.href = "../pages/customer_home.html";
            }
        }, 1000);
    </script>
</body>
</html>
