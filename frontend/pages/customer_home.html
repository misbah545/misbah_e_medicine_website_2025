<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - E-Medicine</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            padding: 100px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.9), rgba(13, 148, 136, 0.8)), url('../assets/images/Customerhomebg.jpeg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: white;
            border-bottom: 5px solid var(--accent-color);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hero-content p {
            font-size: 1.2 remit;
            font-weight: 300;
            margin-bottom: 40px;
            color: #e2e8f0;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        #search {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: 2px solid transparent;
            border-radius: 50px;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
        }

        #search:focus {
            background: white;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transform: scale(1.02);
        }

        /* Products Section */
        .products-section {
            padding: 80px 20px;
            flex-grow: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title h2 {
            font-size: 2.5rem;
            color: var(--secondary-color);
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* Product Card specific overrides */
        .product-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
            border: 1px solid var(--border-color);
        }

        .product-img-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.08);
        }

        .product-info {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-info h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .product-info .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .product-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-actions .btn {
            width: 100%;
        }

    </style>
</head>
<body>
    <div class="page-wrapper">
        <div id="navbar"></div>

        <section class="hero-banner animate-fade-in">
            <div class="hero-content">
                <h1>Premium Healthcare Solutions</h1>
                <p>Find the best medical products, supplements, and personal care items delivered directly to you.</p>
                <div class="search-wrapper">
                    <input type="text" id="search" placeholder="Search for products, medicines, or equipment..." onkeyup="searchProducts()">
                </div>
                <p id="noResults" style="display: none; margin-top: 15px; color: #fca5a5; font-weight: 500;">No products found.</p>
            </div>
        </section>

        <section class="products-section">
            <div class="section-title">
                <h2>Our Products</h2>
            </div>
            <div class="product-grid" id="productGrid">
                <!-- Products injected by JS -->
            </div>
        </section>

        <div id="footer"></div>
    </div>

    <script>
        // Load layout components
        fetch('../components/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);

        // Navigation actions
        function viewDetails(productId) {
            window.location.href = `product_details.html?product_id=${productId}`;
        }

        function addToCart(product_id) {
            let quantity = prompt("Enter quantity:", "1");
            if (!quantity || isNaN(quantity) || quantity < 1) {
                alert("Invalid quantity!");
                return;
            }

            fetch('http://localhost:8000/backend/controllers/cart.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `product_id=${product_id}&quantity=${quantity}`
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
            })
            .catch(error => console.error('Error:', error));
        }

        // Fetch products mapping them into the new UI
        document.addEventListener("DOMContentLoaded", function () {
            fetch('http://localhost:8000/backend/controllers/customer_home.php')
                .then(response => response.json())
                .then(products => {
                    let productGrid = document.getElementById('productGrid');
                    productGrid.innerHTML = "";
                    
                    if (products.length === 0) {
                        productGrid.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>No products available currently.</p>";
                        return;
                    }

                    products.forEach((product, index) => {
                        let delay = (index * 0.1).toFixed(1);
                        let productHTML = `
                            <div class="card product-card animate-slide-up" style="animation-delay: ${delay}s; opacity: 0;">
                                <div class="product-img-wrapper">
                                    <img src="../assets/images/${product.Product_img}" alt="${product.Pro_name}" onerror="this.src='https://placehold.co/400x300?text=No+Image';">
                                </div>
                                <div class="product-info">
                                    <h3 class="product-name">${product.Pro_name}</h3>
                                    <p class="price">&#8377;${product.Price}</p>
                                    <div class="product-actions">
                                        <button class="btn btn-outline" onclick="viewDetails(${product.Product_id})">View Details</button>
                                        <button class="btn btn-primary" onclick="addToCart(${product.Product_id})">Add to Cart</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        productGrid.innerHTML += productHTML;
                    });
                })
                .catch(error => {
                    console.error('Error fetching products:', error);
                    let productGrid = document.getElementById('productGrid');
                    // Fallback visual content if backend is offline so the user can see the design
                    productGrid.innerHTML = `
                        <div class="card product-card animate-slide-up" style="opacity:1; transform:none;">
                            <div class="product-img-wrapper"><img src="https://placehold.co/400x300?text=Demo+Product" alt="Demo"></div>
                            <div class="product-info">
                                <h3 class="product-name">Demo Medicine Set</h3>
                                <p class="price">&#8377;250</p>
                                <div class="product-actions">
                                    <button class="btn btn-outline">View Details</button>
                                    <button class="btn btn-primary">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                         <div class="card product-card animate-slide-up" style="opacity:1; transform:none; animation-delay: 0.1s">
                            <div class="product-img-wrapper"><img src="https://placehold.co/400x300?text=Vitamins" alt="Demo"></div>
                            <div class="product-info">
                                <h3 class="product-name">Premium Vitamins</h3>
                                <p class="price">&#8377;500</p>
                                <div class="product-actions">
                                    <button class="btn btn-outline">View Details</button>
                                    <button class="btn btn-primary">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
        });

        // Search logic
        function searchProducts() {
            let input = document.getElementById("search").value.toLowerCase();
            let products = document.querySelectorAll(".product-card");
            let noResults = document.getElementById("noResults");
            let found = false;

            products.forEach(product => {
                let productName = product.querySelector(".product-name").innerText.toLowerCase();
                if (productName.includes(input)) {
                    product.style.display = "flex"; 
                    found = true;
                } else {
                    product.style.display = "none";  
                }
            });

            noResults.style.display = found ? "none" : "block";
        }
    </script>
</body>
</html>
