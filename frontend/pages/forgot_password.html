<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - E-Medicine</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a, #0d9488);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-card h1 {
            font-size: 1.8rem;
            color: var(--secondary-color);
            margin-bottom: 15px;
        }

        .auth-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 500;
        }
        
        .auth-footer {
            margin-top: 25px;
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--text-muted);
            font-weight: 500;
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .auth-footer a:hover {
            color: var(--primary-color);
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="auth-card">
        <h1>Forgot Password?</h1>
        <p>No worries, we'll send you instructions to reset your password. Please enter your email address.</p>
        
        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="forgot_email" class="input-control" placeholder="john@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
        </form>
        
        <div class="auth-footer">
            <a href="http://localhost:8000/frontend/pages/Customer_login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $("#forgotForm").on("submit", function (event) {
                event.preventDefault();
                let btn = $(this).find('button[type="submit"]');
                btn.prop('disabled', true).text('Sending...');

                $.ajax({
                    url: "http://localhost:8000/backend/controllers/forgot_password.php",
                    type: "POST",
                    data: $(this).serialize(),
                    success: function (response) {
                        try {
                            const res = JSON.parse(response);
                            if(res.status === "error") {
                                alert(res.message);
                            } else {
                                alert("Reset link sent! Please check your email.");
                                window.location.href = "http://localhost:8000/frontend/pages/Customer_login.html";
                            }
                        } catch(e) {
                            alert(response); // Fallback if backend does not return valid json
                        }
                        btn.prop('disabled', false).text('Reset Password');
                    },
                    error: function () {
                        alert("Error connecting to server.");
                        btn.prop('disabled', false).text('Reset Password');
                    }
                });
            });
        });
    </script>
</body>
</html>
